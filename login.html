<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - أثر مازن Gym</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body" onload="checkLogin();">
  <div class="login-container">
    <div class="logo text-glow font-display" style="font-size: clamp(2.5rem, 8vw, 4rem); margin-bottom: 2rem;">أثر MAZEN</div>
    
    <div id="gender-step" class="glass card p-4" style="max-width: 500px; width: 100%;">
      <h2 class="font-display mb-2 text-center" style="font-size: 2.5rem;">Choose Your Path</h2>
      <div class="gender-toggle">
        <div class="gender-card" onclick="selectGender('male')">
          <div style="font-size: 4rem; margin-bottom: 1rem;">👨</div>
          <h3>Male</h3>
          <p>Built for the grind</p>
        </div>
        <div class="gender-card" onclick="selectGender('female')">
          <div style="font-size: 4rem; margin-bottom: 1rem;">👩</div>
          <h3>Female</h3>
          <p>Built for her power</p>
        </div>
      </div>
    </div>

    <div id="name-step" class="glass card p-4" style="max-width: 400px; width: 100%; display: none;">
      <h2 class="font-display mb-2 text-center">What's your name?</h2>
      <input type="text" id="userName" placeholder="Enter your name" class="glass p-3 w-full mb-3" style="font-size: 1.2rem;">
      <button class="btn btn-primary ripple w-full" onclick="login();">Enter the Gym 🔥</button>
    </div>
  </div>

  <footer class="contact-footer">
    <!-- Same footer as other pages -->
    <div class="contact-grid">
      <div class="contact-card glass">
        <h4>📞 Phone & WhatsApp</h4>
        <div class="phone-whatsapp">
          <a href="tel:+201116404093" class="contact-link" target="_blank">📞 +20 111 640 4093</a>
          <a href="https://wa.me/201116404093" class="contact-link" target="_blank">💬 WhatsApp</a>
        </div>
      </div>
      <div class="contact-card glass">
        <h4>📸 Instagram</h4>
        <a href="https://www.instagram.com/zonaaa__1" class="contact-link insta-link" target="_blank">
          @zonaaa__1
        </a>
      </div>
    </div>
    <div style="text-align: center; opacity: 0.7; font-size: 0.9rem;">
      © 2025 أثر مازن — Athar Mazen. All rights reserved.
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    function selectGender(gender) {
      localStorage.setItem('userGender', gender);
      document.querySelectorAll('.gender-card').forEach(card => card.classList.remove('active'));
      event.target.closest('.gender-card').classList.add('active');
      document.getElementById('gender-step').style.display = 'none';
      document.getElementById('name-step').style.display = 'block';
      document.getElementById('name-step').classList.add('stagger');
    }

    function checkLogin() {
      const name = localStorage.getItem('userName');
      const gender = localStorage.getItem('userGender');
      if (name && gender) {
        window.location.href = 'index.html';
      }
    }
  </script>
</body>
</html>
